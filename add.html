<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="add.html">Add Student</a>
        <a href="view.html">View Students</a>
        <a href="logout.html">Logout</a>
    </nav><br/><br/>
    <form action="view.html" onsubmit="return validate()">
    Name : <input type="text" name="name"><br><br>
    Roll Number : <input type="text" name="rollno"><br><br>
    CGPA :<input type="text" name="cgpa"><br><br>
    Branch :<input type="text" name="branch"><br><br>
    <button type="submit">Add Student</button>
</form>
</body>
<script>
    function validate() {
        const form = document.querySelector('form');
        const name = form.name.value;
        const rollno = form.rollno.value;
        const cgpa = form.cgpa.value;
        const branch = form.branch.value;
        const nr=/^[A-Za-z]{3,20}$/;
        const rr=/^\w{10}$/;
        const cr=/^\d+(\.{1}\d)?$/;
        const br=/^[A-Z]{3}$/;
        if (!nr.test(name)) {
            alert("invalid name");
            return false;
            }

        if (!rr.test(rollno)) {
            alert("invalid rollno");
            return false;
        }

        if (!cr.test(cgpa)) {
            alert("invalid cgpa");
            return false;
        }

        if (!br.test(branch)) {
            alert("invalid branch");
            return false;
        }
        const student = { name, rollno, cgpa, branch };
        fetch("http://localhost:3000/students", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(student)
        });
        return true;
        }
</script>
</html>
