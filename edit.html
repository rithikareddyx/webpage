<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="add.html">Add Student</a>
    <a href="view.html">View Students</a>
    <a href="logout.html">Logout</a>
</nav>

<h1>Edit Student Details</h1>

<form id="editForm">
    Name :<input type="text" id="name" required><br><br>
    Roll Number :<input type="text" id="rno" readonly><br><br>
    CGPA :<input type="text" id="cgpa" required><br><br>
    Branch :<input type="text" id="branch" required><br><br>
    <button type="submit">Update Student</button>
</form>
<script>
const student = JSON.parse(localStorage.getItem("editStudent"));
document.getElementById("name").value = student.name;
document.getElementById("rno").value = student.rollNumber;
document.getElementById("cgpa").value = student.cgpa;
document.getElementById("branch").value = student.branch;

document.getElementById("editForm").addEventListener("submit", function(e) {

    e.preventDefault();
    let students = JSON.parse(localStorage.getItem("students")) || [];
    const index = students.findIndex(
        s => s.rollNumber === student.rollNumber
    );
    if(index !== -1) {

        students[index].name = document.getElementById("name").value;
        students[index].cgpa = document.getElementById("cgpa").value;
        students[index].branch = document.getElementById("branch").value;
        localStorage.setItem("students", JSON.stringify(students));
        alert("Student Updated Successfully!");
        window.location.href = "view.html";
    }

});

</script>

</body>
</html>
