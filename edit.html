<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="add.html">Add Student</a>
        <a href="view.html">View Students</a>
        <a href="logout.html">Logout</a>
    </nav>

    <br><br>

    <form id="editForm">
        Name :<input type="text" id="name"><br><br>
        Roll Number :<input type="text" id="rollno"><br><br>
        CGPA :<input type="text" id="cgpa"><br><br>
        Branch :<input type="text" id="branch"><br><br>
        <button type="submit">Update Student</button>
    </form>
<script>
    
    const url = new URLSearchParams(window.location.search);
    const id = url.get("id");
        
    async function loadStudent() {
        const res = await fetch("http://localhost:3000/students/" + id);
        const student = await res.json();
        document.getElementById("name").value = student.name;
        document.getElementById("rollno").value = student.rollno;
        document.getElementById("cgpa").value = student.cgpa;
        document.getElementById("branch").value = student.branch;
    }
    loadStudent();
        document.getElementById("editForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const user={
            name: document.getElementById("name").value,
            rollno: document.getElementById("rollno").value,
            cgpa: document.getElementById("cgpa").value,
            branch: document.getElementById("branch").value
        };
        await fetch("http://localhost:3000/students/"+id, {
                    method: "PUT",
                    body: JSON.stringify(user),
                })
                alert("Student Updated Successfully!");
                window.location.href = "view.html";
        });
</script>
</body>
</html>
