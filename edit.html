<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="add.html">Add Student</a>
    <a href="view.html">View Students</a>
    <a href="logout.html">Logout</a>
</nav>

<h1>Edit Student Details</h1>

<form id="editForm">
    Name :<input type="text" id="name" required><br><br>
    Roll Number :<input type="text" id="rollno" readonly><br><br>
    CGPA :<input type="text" id="cgpa" required><br><br>
    Branch :<input type="text" id="branch" required><br><br>
    <button type="submit">Update Student</button>
</form>
<script>
const student = JSON.parse(localStorage.getItem("student"));
document.getElementById("name").value = student.name;
document.getElementById("rollno").value = student.rollno;
document.getElementById("cgpa").value = student.cgpa;
document.getElementById("branch").value = student.branch;

document.getElementById("editForm").addEventListener("submit", function(e) {
    e.preventDefault();
    student.name = document.getElementById("name").value;
    student.cgpa = document.getElementById("cgpa").value;
    student.branch = document.getElementById("branch").value;
    student.rollno=document.getElementById("rollno").value;
    localStorage.setItem("student", JSON.stringify(student));
    alert("Student Updated Successfully!");
    window.location.href = "view.html";
});

</script>

</body>
</html>
