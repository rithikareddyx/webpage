<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="add.html">Add Student</a>
        <a href="view.html">View Students</a>
        <a href="logout.html">Logout</a>
    </nav><br/><br/>
    <h1>Students List</h1>
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Roll Number</th>
                <th>CGPA</th>
                <th>Branch</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</body>
<script>
const students = JSON.parse(localStorage.getItem('students')) || [];
const tbody = document.querySelector('tbody');
students.forEach(student => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td>${student.name}</td>
        <td>${student.rollNumber}</td>
        <td>${student.cgpa}</td>
        <td>${student.branch}</td>
        <td class="actions">
    <button class="edit-btn" onclick="editStudent('${student.rollNumber}')">Edit</button>
    <button class="delete-btn" onclick="deleteStudent('${student.rollNumber}')">Delete  </button>
    </td>`;
    tbody.appendChild(tr);
});
function editStudent(rollNumber) {
    const student = students.find(s => s.rollNumber === rollNumber);
    if (student) {
        localStorage.setItem('editStudent', JSON.stringify(student));
        window.location.href = 'edit.html';
    }
}
function deleteStudent(rollNumber) {
    const index = students.findIndex(s => s.rollNumber === rollNumber);
    if (index !== -1) {
        students.splice(index, 1);
        localStorage.setItem('students', JSON.stringify(students));
    }
    location.reload();
}
</script>
</html>
