<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <nav>
        <a href="home.html">Home</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
    </nav><br/><br/>
    <form action="login.html" onsubmit="storeUser(event)">
        Username : <input type ="text" id="username" required minlength="4" maxlength="12"><br/><br/>
        Email : <input type="email" id="email"><br/><br/>
        Password : <input type="password" id="password"><br/><br/>
        Confirm Password : <input type="password" id="confirm_password"><br/><br/>
        <button type="submit">Register</button>
    </form>
</body>
<script>
    async function storeUser(event) {
        event.preventDefault();
        const uname=document.getElementById('username').value;
        const email=document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;
        const user={
            username: uname,
            email: email,
            password: password
        };
        if (password == confirmPassword) {
            const res = await fetch("http://localhost:3000/users",{
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(user)
            })
            window.location.href = "login.html";
        }else{
            alert('Passwords do not match');
            return; 
        }
        alert('Registration successful!');
    }
</script>
</html>
